# Author: Max Stoddard
services:
  - type: web
    runtime: static
    name: uk-housing-market-abm
    branch: master
    autoDeployTrigger: checksPass
    rootDir: dashboard
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://uk-housing-market-abm-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildFilter:
      paths:
        - dashboard/src/**
        - dashboard/shared/**
        - dashboard/package.json
        - dashboard/package-lock.json
        - dashboard/vite.config.ts
        - dashboard/index.html

  - type: web
    runtime: docker
    name: uk-housing-market-abm-api
    plan: free
    branch: master
    autoDeployTrigger: checksPass
    dockerfilePath: dashboard/Dockerfile.api
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: DASHBOARD_CORS_ORIGIN
        value: https://uk-housing-market-abm.onrender.com
      - key: DASHBOARD_ENABLE_MODEL_RUNS
        value: "false"
      - key: DASHBOARD_WRITE_USERNAME
        sync: false
      - key: DASHBOARD_WRITE_PASSWORD
        sync: false
      - key: DASHBOARD_LOG_MEMORY
        value: "false"
    buildFilter:
      paths:
        - dashboard/Dockerfile.api
        - dashboard/server/**
        - dashboard/shared/**
        - dashboard/package.json
        - dashboard/package-lock.json
        - input-data-versions/**
        - dashboard/tsconfig.server.json
        - .dockerignore
        - render.yaml
